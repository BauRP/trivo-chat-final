name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 36
          build-tools: 36.0.0

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Project
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Total Cleanup and Force MinSDK 23
        run: |
          # Ищем версию 22 во ВСЕХ файлах проекта и библиотек и меняем на 23
          grep -rl "minSdkVersion 22" . | xargs sed -i 's/minSdkVersion 22/minSdkVersion 23/g' || true
          grep -rl "minSdkVersion = 22" . | xargs sed -i 's/minSdkVersion = 22/minSdkVersion = 23/g' || true
          grep -rl "minSdk 22" . | xargs sed -i 's/minSdk 22/minSdk 23/g' || true

      - name: Build APK
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug \
            -Pandroid.overrideCompileSdk=36 \
            -Pandroid.overrideTargetSdk=36 \
            -Pandroid.overrideMinSdk=23 \
            -Pandroid.lint.haltOnError=false

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
